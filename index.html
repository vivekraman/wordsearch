<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Word Search</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon-32.png" type="image/png">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS homescreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Word Search">
  <link rel="apple-touch-icon" href="icon-180.png">

  <!-- Theme color (browser chrome on Android) -->
  <meta name="theme-color" content="#5a64dc">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="bg-layer"></div>

  <header>
    <div id="category-label">Word Search</div>
    <div id="timer">0:00</div>
  </header>

  <main>
    <div id="grid-container"></div>

    <section id="word-list-section">
      <div id="word-list"></div>
    </section>

    <div id="controls">
      <button id="btn-new">New Puzzle</button>
      <button id="btn-category">Change Category</button>
    </div>
  </main>

  <!-- Category picker modal -->
  <div id="category-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Choose a Category</h2>
      <div id="category-grid"></div>
      <button id="btn-close-modal">Cancel</button>
    </div>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay" class="hidden">
    <div id="win-box">
      <div id="win-trophy">🏆</div>
      <h1 id="win-heading">You found all the words!</h1>
      <p id="win-time"></p>
      <button id="btn-play-again">Play Again</button>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
