<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Brain Games</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon-32.png" type="image/png">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS homescreen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brain Games">
  <link rel="apple-touch-icon" href="icon-180.png">

  <!-- Theme color (browser chrome on Android) -->
  <meta name="theme-color" content="#5a64dc">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="fractions-style.css">
  <link rel="stylesheet" href="homophones-style.css">
  <link rel="stylesheet" href="wordle-style.css">

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
          data-cf-beacon='{"token": "168ebde4ca2b450b8bbaf29a7a84d7a2"}'></script>
</head>
<body>

  <div id="bg-layer"></div>

  <header>
    <div id="header-title">Brain Games</div>
    <button id="btn-home" class="hidden">🏠 Home</button>
    <div id="timer" class="hidden">0:00</div>
  </header>

  <main>

    <!-- Game selection menu -->
    <div id="game-menu">
      <h2>Choose a Game</h2>
      <button class="game-pick-btn" data-game="wordsearch">
        <span class="pick-emoji">🔤</span>
        <div>
          <span class="pick-label">Word Search</span>
          <span class="pick-desc">Find hidden words in the grid</span>
        </div>
      </button>
      <button class="game-pick-btn" data-game="fractions">
        <span class="pick-emoji">½</span>
        <div>
          <span class="pick-label">Fractions</span>
          <span class="pick-desc">Compare fractions: which is bigger?</span>
        </div>
      </button>
      <button class="game-pick-btn" data-game="homophones">
        <span class="pick-emoji">👂</span>
        <div>
          <span class="pick-label">Homophones</span>
          <span class="pick-desc">Pick the right word to complete the sentence</span>
        </div>
      </button>
      <button class="game-pick-btn" data-game="wordle">
        <span class="pick-emoji">🟩</span>
        <div>
          <span class="pick-label">Wordle</span>
          <span class="pick-desc">Guess the 4-letter word in 6 tries</span>
        </div>
      </button>
    </div>

    <!-- Word Search game area -->
    <div id="game-wordsearch" class="hidden">
      <div id="category-label"></div>
      <div id="grid-container"></div>

      <section id="word-list-section">
        <div id="word-list"></div>
      </section>

      <div id="controls">
        <button id="btn-new">New Puzzle</button>
        <button id="btn-category">Change Category</button>
      </div>
    </div>

    <!-- Fractions game area -->
    <div id="game-fractions" class="hidden">
      <div id="fractions-progress"></div>
      <div id="fractions-arena">
        <div id="fraction-left" class="fraction-display"></div>
        <div id="fraction-compare-result" class="compare-result">?</div>
        <div id="fraction-right" class="fraction-display"></div>
      </div>
      <div id="fractions-buttons">
        <button class="cmp-btn" data-answer="lt">&lt;</button>
        <button class="cmp-btn" data-answer="eq">=</button>
        <button class="cmp-btn" data-answer="gt">&gt;</button>
      </div>
      <div id="fractions-feedback" class="hidden"></div>
    </div>

    <!-- Wordle game area -->
    <div id="game-wordle" class="hidden">
      <h2 class="wordle-title">WORDLE</h2>
      <div id="wordle-board"></div>
      <div id="wordle-result" class="wordle-result hidden"></div>
      <div id="wordle-keyboard"></div>
      <div id="wordle-controls">
        <button id="btn-wordle-new">New Game</button>
      </div>
    </div>

    <!-- Homophones game area -->
    <div id="game-homophones" class="hidden">
      <div id="homophones-progress"></div>
      <div id="homophones-card">
        <p id="homophones-sentence"></p>
      </div>
      <div id="homophones-word-buttons">
        <button class="word-btn" id="word-btn-a"></button>
        <button class="word-btn" id="word-btn-b"></button>
      </div>
      <div id="homophones-feedback" class="hidden"></div>
    </div>

  </main>

  <!-- Category picker modal -->
  <div id="category-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Choose a Category</h2>
      <div id="category-grid"></div>
      <button id="btn-close-modal">Cancel</button>
    </div>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay" class="hidden">
    <div id="win-box">
      <div id="win-trophy">🏆</div>
      <h1 id="win-heading">You found all the words!</h1>
      <p id="win-time"></p>
      <p id="win-score"></p>
      <button id="btn-play-again">Play Again</button>
    </div>
  </div>

  <div id="build-label">build 1</div>

  <script src="words.js"></script>
  <script src="script.js"></script>
  <script src="fractions.js"></script>
  <script src="homophones.js"></script>
  <script src="wordle-words.js"></script>
  <script src="wordle.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
    }
  </script>
</body>
</html>
